server:
  port : 5000

spring:
  application:
    name: product-backend

similar:
  products:
    api:
      base-url: ${SIMILAR_PRODUCTS_API_BASE_URL:http://localhost:3001}
      timeout-ms: 2000

resilience4j:
  # Decoration order is controlled programmatically in SimilarProductsApiAdapter:
  #   CircuitBreaker (outer) → Retry → Bulkhead (inner) → method
  # CB therefore records one result per full retry sequence, not per individual attempt.
  circuitbreaker:
    instances:
      externalApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50        # opens when ≥ 50 % of the last 10 calls are slow
        slow-call-duration-threshold: 1s    # a call taking > 1s counts as slow
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.julian.product_backend.domain.exception.ProductNotFoundException
          - io.github.resilience4j.bulkhead.BulkheadFullException
  retry:
    instances:
      externalApi:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - com.julian.product_backend.domain.exception.ProductNotFoundException
          - org.springframework.web.client.HttpClientErrorException
  bulkhead:
    instances:
      externalApi:
        max-concurrent-calls: 10
        max-wait-duration: 0ms

